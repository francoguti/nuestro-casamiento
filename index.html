<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 · 12 · 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --ivory: #f5efe3;
    --gold: #b8965a;
    --gold2: #d4b07a;
    --dark: #1c1610;
    --mid: #2e2218;
}
html, body { height: 100%; }
body {
    font-family: 'Montserrat', sans-serif;
    background: var(--dark);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
}
.split {
    display: flex;
    flex-direction: row;
    width: 100%;
    min-height: 100vh;
}
.photo-side {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 50vh;
}
.photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
}
.photo-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(28,22,16,0.6) 100%);
    pointer-events: none;
}
.photo-badge {
    position: absolute;
    bottom: 28px;
    left: 28px;
    z-index: 2;
    opacity: 0;
    animation: fadeUp .9s ease .3s forwards;
}
.photo-badge .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245,239,227,0.75);
    margin-bottom: 6px;
}
.photo-badge .big-date {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 5vw, 4rem);
    color: var(--ivory);
    line-height: 0.95;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
}
.photo-badge .big-date span { color: var(--gold2); font-style: italic; }
.info-side {
    width: 340px;
    flex-shrink: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 52px 40px;
    position: relative;
    overflow: hidden;
}
.info-side::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(184,150,90,0.04) 18px, rgba(184,150,90,0.04) 19px);
    pointer-events: none;
}
.info-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    text-align: center;
    opacity: 0;
    animation: fadeUp .9s ease .5s forwards;
}
.monogram {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 24px;
}
.sep { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.sep-line { flex: 1; height: 1px; background: rgba(184,150,90,0.35); }
.sep-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); }
.faltan-label {
    font-weight: 200;
    font-size: 0.58rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(245,239,227,0.45);
    margin-bottom: 20px;
}
.countdown {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 28px;
}
.unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 8px 14px;
    border: 1px solid rgba(184,150,90,0.2);
    position: relative;
}
.unit::before, .unit::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.6;
}
.unit::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
.unit::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
.num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 4vw, 3rem);
    color: var(--ivory);
    line-height: 1;
    min-width: 2ch;
}
.lbl {
    font-weight: 300;
    font-size: 0.5rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 7px;
    opacity: 0.8;
}
.quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.7;
    color: rgba(245,239,227,0.5);
    text-align: center;
}
.quote cite {
    display: block;
    margin-top: 8px;
    font-style: normal;
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 0.55rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(184,150,90,0.6);
}
.celebrate {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--ivory);
    text-align: center;
    line-height: 1.5;
}
@media (max-width: 700px) {
    .split { flex-direction: column; }
    .photo-side { flex: none; height: 55vh; min-height: 300px; }
    .photo-side::after {
        background: linear-gradient(to bottom, transparent 45%, rgba(28,22,16,0.6) 100%);
    }
    .photo-badge { bottom: 20px; left: 20px; }
    .info-side { width: 100%; padding: 36px 28px 44px; }
    .countdown { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .unit { padding: 14px 4px 10px; }
    .num { font-size: clamp(1.6rem, 8vw, 2.4rem); }
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
